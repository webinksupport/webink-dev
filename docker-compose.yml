services:
  webink-dev:
    build: .
    container_name: webink-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=mysql://webink:WebinkDB2026!@webink-mysql:3306/webinkdb
      - NEXTAUTH_URL=https://dev.webink.solutions
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-webink-dev-secret-2026}
    networks:
      - traefik_default
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webink-dev.rule=Host(`dev.webink.solutions`)"
      - "traefik.http.routers.webink-dev.entrypoints=websecure"
      - "traefik.http.routers.webink-dev.tls.certresolver=letsencrypt"
      - "traefik.http.services.webink-dev.loadbalancer.server.port=3001"

networks:
  traefik_default:
    external: true
  default:
